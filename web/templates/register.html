<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — {{ app_name }}</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .auth-wrap { width:380px; }
    .auth-logo { text-align:center; margin-bottom:32px; }
    .auth-logo h1 { font-size:28px; color:var(--accent); margin-bottom:4px; }
    .auth-logo p { color:var(--text-dim); font-size:13px; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">
    <h1>🛡️ OPTISEC</h1>
    <p>Enterprise Security Platform v2.0</p>
  </div>
  <div class="card">
    <div class="card-header">
      <div class="card-title">Create Account</div>
      <div class="card-subtitle">First account becomes admin</div>
    </div>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/register">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="johndoe" autofocus required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="john@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password <span style="color:var(--text-dim);font-size:11px">(min 8 chars)</span></label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px">
        Create Account
      </button>
    </form>
    <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-dim)">
      Already registered? <a href="/login" style="color:var(--accent)">Sign in</a>
    </div>
  </div>
</div>
</body>
</html>
