{% extends "base.html" %}
{% block title %}Error {{ code }} — {{ app_name }}{% endblock %}
{% block page_title %}Error{% endblock %}

{% block content %}
<div class="card" style="max-width:480px;margin:60px auto;text-align:center">
  <div style="font-size:64px;margin-bottom:16px">⚠️</div>
  <div style="font-size:48px;font-weight:700;color:var(--accent);margin-bottom:8px">{{ code }}</div>
  <div style="font-size:18px;margin-bottom:24px">{{ error }}</div>
  <a href="/" class="btn btn-primary">Go to Dashboard</a>
</div>
{% endblock %}
