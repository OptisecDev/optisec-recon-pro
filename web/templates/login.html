<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — {{ app_name }}</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background: var(--bg); }
    .auth-wrap { width:400px; }
    .auth-logo { text-align:center; margin-bottom:28px; }
    .auth-logo h1 { font-size:30px; color:var(--accent); margin-bottom:4px; }
    .auth-logo p { color:var(--text-dim); font-size:13px; }
    .demo-box {
      background: linear-gradient(135deg, rgba(0,255,136,0.06), rgba(0,204,106,0.03));
      border: 1px solid rgba(0,255,136,0.25); border-radius: 10px;
      padding: 16px 20px; margin-bottom: 16px; text-align: center;
    }
    .demo-box-title { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
    .demo-box-sub   { font-size: 12px; color: var(--text-dim); margin-bottom: 12px; }
    .btn-demo-big {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 11px; background: var(--accent); color: #000;
      font-size: 14px; font-weight: 800; border-radius: 8px; text-decoration: none;
      transition: all 0.15s; letter-spacing: 0.3px;
    }
    .btn-demo-big:hover { background: #00cc6a; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,255,136,0.3); }
    .divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; color: var(--text-dim); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">
    <h1>🛡️ OPTISEC</h1>
    <p>v4.0 SINGULARITY — Enterprise Security Platform</p>
  </div>

  <!-- Demo Box -->
  <div class="demo-box">
    <div class="demo-box-title">⚡ جرّب المنصة بدون تسجيل</div>
    <div class="demo-box-sub">وصول فوري لحساب الديمو مع بيانات جاهزة — لا كلمة مرور مطلوبة</div>
    <a href="/demo" class="btn-demo-big">🎮 ادخل الديمو الآن</a>
  </div>

  <div class="divider">أو سجّل الدخول بحسابك</div>

  <div class="card">
    {% if error %}
    <div class="alert alert-error" style="margin-bottom:16px">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/login">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="form-group">
        <label>Username or Email</label>
        <input type="text" name="username" placeholder="admin" autofocus required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-secondary" style="width:100%;justify-content:center;margin-top:4px">
        Sign In →
      </button>
    </form>
    <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-dim)">
      New here? <a href="/register" style="color:var(--accent)">Create account</a>
      · <a href="/landing" style="color:var(--text-dim)">Learn more</a>
    </div>
  </div>
</div>
</body>
</html>
