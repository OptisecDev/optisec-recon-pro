<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — {{ app_name }}</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .auth-wrap { width:380px; }
    .auth-logo { text-align:center; margin-bottom:32px; }
    .auth-logo h1 { font-size:28px; color:var(--accent); margin-bottom:4px; }
    .auth-logo p { color:var(--text-dim); font-size:13px; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">
    <h1>🛡️ OPTISEC</h1>
    <p>Enterprise Security Platform v2.0</p>
  </div>
  <div class="card">
    <div class="card-header">
      <div class="card-title">Sign In</div>
    </div>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/login">
      <input type="hidden" name="next" value="{{ next }}">
      <div class="form-group">
        <label>Username or Email</label>
        <input type="text" name="username" placeholder="admin" autofocus required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px">
        Sign In
      </button>
    </form>
    <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-dim)">
      New here? <a href="/register" style="color:var(--accent)">Create account</a>
    </div>
  </div>
</div>
</body>
</html>
